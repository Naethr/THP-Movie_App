<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Movie Finder</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="page-shell">
      <section class="hero-section">
        <div class="container">
          <div class="hero-content">
            <p class="eyebrow">OMDb API search</p>
            <h1>Movie Finder</h1>
            <p class="intro">
              Search for movies and series, browse the results, and open a quick detail view with the full plot when available.
            </p>

            <form id="search-form" class="search-form" novalidate>
              <label for="search-input" class="form-label">Movie or series title</label>
              <div class="input-group input-group-lg">
                <input
                  id="search-input"
                  class="form-control"
                  type="text"
                  placeholder="Example: Batman"
                  autocomplete="off"
                />
                <button class="btn btn-primary" type="submit">Search</button>
              </div>
            </form>
          </div>
        </div>
      </section>

      <section class="results-section">
        <div class="container">
          <div id="status-message" class="status-message">
            Enter a movie or series title to start searching.
          </div>
          <div id="results-grid" class="results-grid" aria-live="polite"></div>
        </div>
      </section>
    </main>

    <div
      class="modal fade"
      id="movie-modal"
      tabindex="-1"
      aria-labelledby="movie-modal-title"
      aria-hidden="true"
    >
      <div class="modal-dialog modal-dialog-centered modal-lg">
        <div class="modal-content movie-modal">
          <div class="modal-header">
            <div>
              <p class="modal-kicker">Movie details</p>
              <h2 class="modal-title" id="movie-modal-title">Title</h2>
            </div>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div class="modal-body" id="movie-modal-body"></div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script src="config.js"></script>
    <script src="script.js"></script>
  </body>
</html>
